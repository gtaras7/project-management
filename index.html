<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .line-clamp-3 { display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
    .line-clamp-1 { display:-webkit-box; -webkit-line-clamp:1; -webkit-box-orient:vertical; overflow:hidden; }
  </style>
</head>
<body class="min-h-screen bg-slate-50 font-sans text-slate-900 pb-12 antialiased">

  <header id="app-header" class="bg-gradient-to-r from-slate-900 via-[#1b3447] to-slate-900 text-white shadow-xl py-5 px-6 shrink-0 select-none border-b border-[#3BBDE5]/20"></header>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 mt-8 space-y-6">
    <div id="tab-nav" class="flex overflow-x-auto pb-1 gap-2.5 border-b border-slate-200"></div>
    <div id="tab-content" class="space-y-6"></div>
  </main>

  <!-- Modal: Authentication (Login / Register) -->
  <div id="modal-auth" class="fixed inset-0 bg-slate-900/65 backdrop-blur-md items-center justify-center p-4 z-50 flex hidden">
    <div class="bg-white/95 rounded-2xl shadow-2xl max-w-sm w-full border border-slate-200/50 p-6 space-y-5 overflow-hidden transition-all transform scale-100">
      <!-- Title & Tabs -->
      <div class="space-y-1 text-center">
        <h3 id="auth-title" class="text-lg font-extrabold tracking-tight text-slate-900">Sign In</h3>
        <p id="auth-subtitle" class="text-xs text-slate-500">Access your Project Tracker board</p>
      </div>

      <!-- Tab Selectors -->
      <div class="flex bg-slate-100 rounded-lg p-1 border border-slate-200">
        <button id="tab-btn-login" type="button" class="flex-1 text-xs font-bold py-1.5 rounded-md bg-white text-slate-900 shadow-sm transition-all focus:outline-none">Log In</button>
        <button id="tab-btn-register" type="button" class="flex-1 text-xs font-bold py-1.5 rounded-md text-slate-500 hover:text-slate-900 transition-all focus:outline-none">Sign Up</button>
      </div>

      <!-- Error message container -->
      <div id="auth-error" class="hidden bg-rose-50 border border-rose-200 text-rose-700 text-xs px-3 py-2 rounded-lg font-medium"></div>

      <!-- Combined Form -->
      <form id="form-auth" class="space-y-4">
        <!-- Email field (only visible for Register) -->
        <div id="auth-email-group" class="space-y-1.5 hidden">
          <label class="text-[11px] font-bold text-slate-600 uppercase tracking-wider block">Email Address</label>
          <input id="auth-email" type="email" placeholder="you@example.com"
            class="w-full text-xs bg-slate-50 border border-slate-200 rounded-lg px-3 py-2.5 text-slate-800 outline-none focus:bg-white focus:ring-2 focus:ring-[#3BBDE5]/20 focus:border-[#3BBDE5]" />
        </div>

        <div class="space-y-1.5">
          <label class="text-[11px] font-bold text-slate-600 uppercase tracking-wider block">Username</label>
          <input id="auth-username" type="text" placeholder="e.g. johndoe" required
            class="w-full text-xs bg-slate-50 border border-slate-200 rounded-lg px-3 py-2.5 text-slate-800 outline-none focus:bg-white focus:ring-2 focus:ring-[#3BBDE5]/20 focus:border-[#3BBDE5]" />
        </div>

        <div class="space-y-1.5">
          <label class="text-[11px] font-bold text-slate-600 uppercase tracking-wider block">Password</label>
          <input id="auth-password" type="password" placeholder="••••••••" required
            class="w-full text-xs bg-slate-50 border border-slate-200 rounded-lg px-3 py-2.5 text-slate-800 outline-none focus:bg-white focus:ring-2 focus:ring-[#3BBDE5]/20 focus:border-[#3BBDE5]" />
        </div>

        <button type="submit" id="btn-auth-submit"
          class="w-full py-2.5 text-xs font-extrabold text-white bg-[#2E7D9B] hover:bg-[#3BBDE5] rounded-lg shadow-md transition-all">Sign In</button>
      </form>
    </div>
  </div>

  <!-- Modal: Create Project -->
  <div id="modal-project" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm items-center justify-center p-4 z-50">
    <div class="bg-white rounded-xl shadow-xl max-w-md w-full border border-slate-100 p-6 space-y-4">
      <h3 id="modal-project-title" class="text-base font-bold text-slate-900 border-b border-slate-100 pb-3">Course Project</h3>
      <form id="form-project" class="space-y-4">
        <input type="hidden" id="proj-id" value="" />
        <div class="space-y-1.5">
          <label class="text-xs font-bold text-slate-700 block">Project Title</label>
          <input id="proj-name" type="text" placeholder="e.g. php-contact-form" required
            class="w-full text-xs bg-slate-50 border border-slate-200 rounded-lg px-3 py-2.5 text-slate-800 outline-none focus:bg-white focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500" />
          <p id="proj-name-error" class="text-xs text-rose-600 hidden">Project title is required.</p>
        </div>
        <div class="space-y-1.5">
          <label class="text-xs font-bold text-slate-700 block">Project Goal Description</label>
          <textarea id="proj-desc" rows="3" placeholder="Review relational dependencies, custom parameter bindings..."
            class="w-full text-xs bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-slate-800 outline-none focus:bg-white focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 resize-none"></textarea>
        </div>
        <div class="flex gap-3 justify-end pt-2 border-t border-slate-100">
          <button type="button" id="btn-cancel-project"
            class="px-4 py-2 text-xs font-semibold text-slate-600 hover:bg-slate-50 border border-slate-200 rounded-lg">Cancel</button>
          <button type="submit"
            class="px-4 py-2 text-xs font-bold text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg shadow">Save Project</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Modal: Create Task -->
  <div id="modal-task" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm items-center justify-center p-4 z-50">
    <div class="bg-white rounded-xl shadow-xl max-w-lg w-full border border-slate-100 p-6 space-y-4">
      <h3 id="modal-task-title" class="text-base font-bold text-slate-900 border-b border-slate-100 pb-3">Tracked Task</h3>
      <form id="form-task" class="space-y-4">
        <input type="hidden" id="task-id" value="" />
        <div class="space-y-1.5">
          <label class="text-xs font-bold text-slate-700 block">Task Name</label>
          <input id="task-title" type="text" placeholder="e.g. Code password validation middleware" required
            class="w-full text-xs bg-slate-50 border border-slate-200 rounded-lg px-3 py-2.5 text-slate-800 outline-none focus:bg-white focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500" />
          <p id="task-title-error" class="text-xs text-rose-600 hidden">Task name is required.</p>
        </div>
        <div class="space-y-1.5">
          <label class="text-xs font-bold text-slate-700 block">Description Details</label>
          <textarea id="task-desc" rows="3"
            class="w-full text-xs bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-slate-800 outline-none focus:bg-white focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 resize-none"></textarea>
        </div>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="space-y-1.5">
            <label class="text-xs font-bold text-slate-700 block">Associated Project</label>
            <select id="task-project" required
              class="w-full text-xs bg-slate-50 border border-slate-200 rounded-lg px-3 py-2.5 text-slate-800 outline-none focus:bg-white focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500"></select>
          </div>
          <div class="space-y-1.5">
            <label class="text-xs font-bold text-slate-700 block">Target Deadline</label>
            <input id="task-deadline" type="date"
              class="w-full text-xs bg-slate-50 border border-slate-200 rounded-lg px-3 py-2.5 text-slate-800 outline-none focus:bg-white focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500" />
          </div>
          <div class="space-y-1.5">
            <label class="text-xs font-bold text-slate-700 block">Priority Level</label>
            <select id="task-priority"
              class="w-full text-xs bg-slate-50 border border-slate-200 rounded-lg px-3 py-2.5 text-slate-800 outline-none focus:bg-white focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500">
              <option value="low">Low priority</option>
              <option value="medium">Medium priority</option>
              <option value="high">High priority</option>
            </select>
          </div>
          <div class="space-y-1.5">
            <label class="text-xs font-bold text-slate-700 block">Starting Status</label>
            <select id="task-status"
              class="w-full text-xs bg-slate-50 border border-slate-200 rounded-lg px-3 py-2.5 text-slate-800 outline-none focus:bg-white focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500">
              <option value="todo">To Do</option>
              <option value="in_progress">In Progress</option>
              <option value="review">Under Review</option>
              <option value="done">Completed</option>
            </select>
          </div>
        </div>
        <div class="flex gap-3 justify-end pt-2 border-t border-slate-100">
          <button type="button" id="btn-cancel-task"
            class="px-4 py-2 text-xs font-semibold text-slate-600 hover:bg-slate-50 border border-slate-200 rounded-lg">Cancel</button>
          <button type="submit"
            class="px-4 py-2 text-xs font-bold text-white bg-indigo-600 hover:bg-indigo-700 rounded-lg shadow">Save Task Block</button>
        </div>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
